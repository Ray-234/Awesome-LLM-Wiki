name: Add a resource
description: Suggest a new LLM Wiki resource for the list.
title: "Add resource: "
labels: ["resource"]
body:
  - type: input
    id: name
    attributes:
      label: Resource name
      placeholder: "Project, paper, article, or tool name"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: "https://..."
    validations:
      required: true
  - type: dropdown
    id: section
    attributes:
      label: Target section
      options:
        - Original Idea
        - Templates And Starter Kits
        - Cases
        - Papers And Research
        - Evaluation And Safety
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why should this be included?
      description: Explain its concrete relationship to LLM Wiki.
      placeholder: "This belongs because..."
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Suggested tags
      placeholder: "agent-skill, mcp, obsidian"
    validations:
      required: false
